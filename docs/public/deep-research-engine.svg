<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1117"/>
      <stop offset="1" stop-color="#1a1b26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#00f0ff"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowLg">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="url(#bg)" rx="12"/>

  <!-- Subtle radial glow -->
  <ellipse cx="480" cy="320" rx="300" ry="200" fill="#8b5cf6" opacity="0.03"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#e2e8f0" font-family="'SF Mono',monospace" font-size="22" font-weight="bold">Deep Research Engine</text>
  <text x="480" y="60" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Autonomous Multi-Source Intelligence — Zero API Keys Required</text>

  <!-- ═══ Research Query Input ═══ -->
  <rect x="280" y="78" width="400" height="36" rx="18" fill="#1e1f2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="300" y="101" fill="#64748b" font-family="monospace" font-size="11">$ research "How do transformer attention mechanisms scale?"</text>

  <!-- Arrow down -->
  <line x1="480" y1="114" x2="480" y2="138" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.6"/>

  <!-- ═══ Dual Mode Split ═══ -->
  <rect x="60" y="138" width="400" height="70" rx="8" fill="#1e1f2e" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="260" y="160" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="12" font-weight="bold">Autonomous Mode</text>
  <text x="260" y="176" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Local LLM (Ollama) — fully self-hosted</text>
  <text x="260" y="192" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">Zero cost, unlimited research</text>

  <rect x="500" y="138" width="400" height="70" rx="8" fill="#1e1f2e" stroke="#d946ef" stroke-width="1.5"/>
  <text x="700" y="160" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="12" font-weight="bold">Hybrid Mode</text>
  <text x="700" y="176" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">CLI Agent Brain + Local Research Tools</text>
  <text x="700" y="192" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">Opus/Sonnet/Gemini reasoning power</text>

  <!-- OR divider -->
  <circle cx="480" cy="173" r="14" fill="#0f1117" stroke="#475569" stroke-width="1"/>
  <text x="480" y="177" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9" font-weight="bold">OR</text>

  <!-- Arrow down -->
  <line x1="480" y1="208" x2="480" y2="232" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.6"/>

  <!-- ═══ Multi-Source Search Layer ═══ -->
  <rect x="60" y="232" width="840" height="64" rx="8" fill="#1a1b26" stroke="#334155" stroke-width="1"/>
  <text x="480" y="252" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold">MULTI-SOURCE SEARCH (RRF-Fused Ranking)</text>

  <!-- Search source boxes -->
  <rect x="80" y="260" width="110" height="26" rx="4" fill="#0f1117" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="135" y="277" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">Brave API</text>

  <rect x="205" y="260" width="110" height="26" rx="4" fill="#0f1117" stroke="#4ade80" stroke-width="0.8"/>
  <text x="260" y="277" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">DuckDuckGo</text>

  <rect x="330" y="260" width="90" height="26" rx="4" fill="#0f1117" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="375" y="277" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="9">arXiv</text>

  <rect x="435" y="260" width="130" height="26" rx="4" fill="#0f1117" stroke="#a5b4fc" stroke-width="0.8"/>
  <text x="500" y="277" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="9">Semantic Scholar</text>

  <rect x="580" y="260" width="100" height="26" rx="4" fill="#0f1117" stroke="#f0abfc" stroke-width="0.8"/>
  <text x="630" y="277" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="9">GitHub</text>

  <rect x="695" y="260" width="100" height="26" rx="4" fill="#0f1117" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="745" y="277" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">SearXNG</text>

  <rect x="810" y="260" width="80" height="26" rx="4" fill="#0f1117" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="850" y="277" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Local LLM</text>

  <!-- ═══ Pipeline ═══ -->
  <line x1="480" y1="296" x2="480" y2="320" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.6"/>

  <!-- Pipeline steps -->
  <g transform="translate(0,320)">
    <!-- Search -->
    <rect x="80" y="0" width="140" height="50" rx="6" fill="#1e1f2e" stroke="#00d4ff" stroke-width="1.2"/>
    <text x="150" y="20" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="11" font-weight="bold">Search</text>
    <text x="150" y="36" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">multi_search</text>

    <!-- Arrow -->
    <line x1="220" y1="25" x2="258" y2="25" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Extract -->
    <rect x="258" y="0" width="140" height="50" rx="6" fill="#1e1f2e" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="328" y="20" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="11" font-weight="bold">Extract</text>
    <text x="328" y="36" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">extract_pages</text>

    <!-- Arrow -->
    <line x1="398" y1="25" x2="436" y2="25" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Analyze -->
    <rect x="436" y="0" width="140" height="50" rx="6" fill="#1e1f2e" stroke="#d946ef" stroke-width="1.2"/>
    <text x="506" y="20" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="11" font-weight="bold">Analyze</text>
    <text x="506" y="36" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">gap analysis loop</text>

    <!-- Arrow -->
    <line x1="576" y1="25" x2="614" y2="25" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Synthesize -->
    <rect x="614" y="0" width="140" height="50" rx="6" fill="#1e1f2e" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="684" y="20" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">Synthesize</text>
    <text x="684" y="36" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">save_research</text>

    <!-- Loop arrow back from Analyze -->
    <path d="M506,50 L506,66 L328,66 L328,50" stroke="#d946ef" stroke-width="1" stroke-dasharray="4 2" fill="none" opacity="0.5" marker-end="url(#arrowRose)"/>
    <text x="417" y="77" text-anchor="middle" fill="#d946ef" font-family="monospace" font-size="7" opacity="0.7">iterative refinement</text>
  </g>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrowRose" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#d946ef"/>
    </marker>
  </defs>

  <!-- ═══ MCP Tools Panel (right side) ═══ -->
  <rect x="780" y="320" width="160" height="170" rx="8" fill="#1e1f2e" stroke="#4ade80" stroke-width="1.2"/>
  <text x="860" y="340" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold">MCP Tools (6)</text>

  <text x="795" y="358" fill="#67e8f9" font-family="monospace" font-size="8">multi_search</text>
  <text x="795" y="373" fill="#a5b4fc" font-family="monospace" font-size="8">extract_pages</text>
  <text x="795" y="388" fill="#fbbf24" font-family="monospace" font-size="8">gather</text>
  <text x="795" y="403" fill="#4ade80" font-family="monospace" font-size="8">save_research</text>
  <text x="795" y="418" fill="#f0abfc" font-family="monospace" font-size="8">get_research</text>
  <text x="795" y="433" fill="#94a3b8" font-family="monospace" font-size="8">finish_research</text>

  <text x="860" y="460" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">stdio JSON-RPC</text>
  <text x="860" y="474" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">attach per-session</text>

  <!-- ═══ Research DB Output ═══ -->
  <rect x="60" y="430" width="700" height="80" rx="8" fill="#1e1f2e" stroke="#4ade80" stroke-width="1.5" filter="url(#glow)"/>
  <text x="410" y="452" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="12" font-weight="bold">Research Database</text>
  <text x="410" y="468" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Findings + Source Citations — Searchable, Filterable, Exportable</text>

  <!-- Mini result rows -->
  <rect x="80" y="478" width="310" height="20" rx="3" fill="#0f1117" stroke="#334155" stroke-width="0.5"/>
  <text x="90" y="492" fill="#4ade80" font-family="monospace" font-size="8">Attention scaling in transformers — 14 sources</text>

  <rect x="410" y="478" width="330" height="20" rx="3" fill="#0f1117" stroke="#334155" stroke-width="0.5"/>
  <text x="420" y="492" fill="#67e8f9" font-family="monospace" font-size="8">Flash Attention optimization techniques — 8 sources</text>

  <!-- ═══ Human-in-the-Loop ═══ -->
  <rect x="60" y="530" width="340" height="50" rx="8" fill="#1e1f2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="230" y="550" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">Human-in-the-Loop Steering</text>
  <text x="230" y="566" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">steer.md or --interactive mode</text>

  <!-- ═══ Plugin Architecture ═══ -->
  <rect x="430" y="530" width="340" height="50" rx="8" fill="#1e1f2e" stroke="#d946ef" stroke-width="1"/>
  <text x="600" y="550" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="10" font-weight="bold">CLI-Native Plugin</text>
  <text x="600" y="566" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">SKILL.md guideline + MCP server — any CLI session</text>

  <!-- Footer -->
  <text x="480" y="616" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">deep_research/ engine + plugins/deep-research/ — No API keys required to start</text>
  <text x="480" y="632" text-anchor="middle" fill="url(#brandGrad)" font-family="monospace" font-size="10" font-weight="bold">IVE — Integrated Vibecoding Environment</text>
</svg>