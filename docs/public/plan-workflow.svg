  <text x="480" y="522" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="12" font-weight="bold">Auto-Approve</text>
  <text x="480" y="538" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Skip review when you trust the agent</text>

  <text x="376" y="558" fill="#fbbf24" font-family="monospace" font-size="7">Cascade-level auto-approve</text>
  <text x="376" y="572" fill="#fbbf24" font-family="monospace" font-size="7">Session-level auto-approve</text>
  <text x="376" y="586" fill="#fbbf24" font-family="monospace" font-size="7">Task-level auto-approve</text>

