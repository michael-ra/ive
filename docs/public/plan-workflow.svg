  <text x="480" y="60" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Dual-Mode MD Editor • Inline Annotation • 3 Approval Modes • Plan-First Tasks</text>

  <!-- ═══ PlanViewer — Edit Mode (left) ═══ -->
