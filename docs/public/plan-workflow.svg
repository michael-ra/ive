  <rect x="521" y="194" width="260" height="14" rx="2" fill="#f59e0b" opacity="0.12"/>
  <rect x="524" y="196" width="10" height="10" rx="2" fill="none" stroke="#475569" stroke-width="0.5"/>
  <text x="540" y="205" fill="#e2e8f0" font-family="monospace" font-size="8">Token revocation list</text>

