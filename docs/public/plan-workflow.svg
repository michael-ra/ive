  <text x="62" y="130" fill="#475569" font-family="monospace" font-size="7">  1</text>
  <text x="86" y="130" fill="#a5b4fc" font-family="monospace" font-size="8" font-weight="bold"># Auth Migration Plan</text>

  <text x="62" y="148" fill="#475569" font-family="monospace" font-size="7">  2</text>
  <text x="86" y="148" fill="#94a3b8" font-family="monospace" font-size="8">## Phase 1: JWT Refresh Tokens</text>

  <text x="62" y="166" fill="#475569" font-family="monospace" font-size="7">  3</text>
  <text x="86" y="166" fill="#4ade80" font-family="monospace" font-size="8">- [x] Implement token rotation</text>

  <text x="62" y="184" fill="#475569" font-family="monospace" font-size="7">  4</text>
  <text x="86" y="184" fill="#4ade80" font-family="monospace" font-size="8">- [x] Add refresh endpoint</text>

  <text x="62" y="202" fill="#475569" font-family="monospace" font-size="7">  5</text>
  <text x="86" y="202" fill="#f59e0b" font-family="monospace" font-size="8">- [ ] Token revocation list</text>

  <text x="62" y="220" fill="#475569" font-family="monospace" font-size="7">  6</text>
  <text x="86" y="220" fill="#64748b" font-family="monospace" font-size="8">- [ ] Rate limit refresh calls</text>

  <text x="62" y="238" fill="#475569" font-family="monospace" font-size="7">  7</text>
  <text x="86" y="238" fill="#94a3b8" font-family="monospace" font-size="8">## Phase 2: OAuth2 PKCE</text>

  <text x="62" y="256" fill="#475569" font-family="monospace" font-size="7">  8</text>
  <text x="86" y="256" fill="#64748b" font-family="monospace" font-size="8">- [ ] Authorization code flow</text>

  <text x="62" y="274" fill="#475569" font-family="monospace" font-size="7">  9</text>
  <text x="86" y="274" fill="#64748b" font-family="monospace" font-size="8">- [ ] Code verifier generation</text>

  <text x="62" y="292" fill="#475569" font-family="monospace" font-size="7"> 10</text>
  <text x="86" y="292" fill="#64748b" font-family="monospace" font-size="8">- [ ] Session cookie migration</text>

