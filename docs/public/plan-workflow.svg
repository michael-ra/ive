  <text x="540" y="173" fill="#94a3b8" font-family="monospace" font-size="8">Implement token rotation</text>

  <rect x="524" y="180" width="10" height="10" rx="2" fill="#4ade80" opacity="0.3" stroke="#4ade80" stroke-width="0.5"/>
  <text x="530" y="188" fill="#4ade80" font-family="monospace" font-size="7">✓</text>
  <text x="540" y="189" fill="#94a3b8" font-family="monospace" font-size="8">Add refresh endpoint</text>

