  <text x="740" y="338" fill="#64748b" font-family="monospace" font-size="7">Structured feedback to agent</text>

  <!-- ═══ 3 Approval Modes (center) ═══ -->
  <rect x="40" y="380" width="880" height="100" rx="10" fill="#1e1f2e" stroke="#4ade80" stroke-width="2" filter="url(#glow)"/>
  <text x="480" y="404" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="14" font-weight="bold">3 Plan Approval Modes</text>
  <text x="480" y="420" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">When agent presents a plan, choose how to proceed</text>

  <!-- Mode 1 -->
  <rect x="60" y="434" width="260" height="34" rx="6" fill="#0f1117" stroke="#4ade80" stroke-width="1"/>
  <circle cx="76" cy="451" r="8" fill="#4ade80" opacity="0.2" stroke="#4ade80" stroke-width="0.8"/>
  <text x="76" y="455" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8" font-weight="bold">1</text>
  <text x="92" y="448" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">Approve &amp; Auto-accept</text>
  <text x="92" y="462" fill="#64748b" font-family="monospace" font-size="7">Agent proceeds, all edits accepted immediately</text>

  <!-- Mode 2 -->
  <rect x="350" y="434" width="260" height="34" rx="6" fill="#0f1117" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="366" cy="451" r="8" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="366" y="455" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8" font-weight="bold">2</text>
  <text x="382" y="448" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold">Approve &amp; Review Edits</text>
  <text x="382" y="462" fill="#64748b" font-family="monospace" font-size="7">Agent proceeds, you approve each individual edit</text>

  <!-- Mode 3 -->
  <rect x="640" y="434" width="260" height="34" rx="6" fill="#0f1117" stroke="#d946ef" stroke-width="1"/>
  <circle cx="656" cy="451" r="8" fill="#d946ef" opacity="0.2" stroke="#d946ef" stroke-width="0.8"/>
  <text x="656" y="455" text-anchor="middle" fill="#d946ef" font-family="monospace" font-size="8" font-weight="bold">3</text>
  <text x="672" y="448" fill="#f0abfc" font-family="monospace" font-size="9" font-weight="bold">Send Feedback</text>
  <text x="672" y="462" fill="#64748b" font-family="monospace" font-size="7">Send annotations or typed feedback, agent revises</text>

  <!-- ═══ Plan-First Tasks (bottom-left) ═══ -->
  <rect x="40" y="500" width="300" height="90" rx="8" fill="#1e1f2e" stroke="#00d4ff" stroke-width="1.2"/>
  <text x="190" y="522" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="12" font-weight="bold">Plan-First Mode</text>
  <text x="190" y="538" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Force agents to plan before coding</text>

  <text x="56" y="558" fill="#67e8f9" font-family="monospace" font-size="7">1. Research codebase</text>
  <text x="56" y="572" fill="#67e8f9" font-family="monospace" font-size="7">2. Present plan → STOP</text>
  <text x="56" y="586" fill="#67e8f9" font-family="monospace" font-size="7">3. Wait for approval → then implement</text>

  <text x="220" y="558" fill="#475569" font-family="monospace" font-size="7">Task status auto-transitions</text>
  <text x="220" y="572" fill="#475569" font-family="monospace" font-size="7">to "planning" when plan ready</text>

  <!-- ═══ Auto-Approve (bottom-center) ═══ -->
