  <text x="350" y="97" text-anchor="end" fill="#475569" font-family="monospace" font-size="6">~/.claude/plans/auth-migration.md</text>
  <rect x="400" y="86" width="44" height="16" rx="3" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="0.5"/>
  <text x="422" y="97" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="6">Cmd+S</text>

