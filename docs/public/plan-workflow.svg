  <text x="524" y="134" fill="#e2e8f0" font-family="monospace" font-size="11" font-weight="bold">Auth Migration Plan</text>

  <text x="524" y="154" fill="#a5b4fc" font-family="monospace" font-size="9" font-weight="bold">Phase 1: JWT Refresh Tokens</text>

