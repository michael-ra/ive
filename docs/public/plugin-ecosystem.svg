  <text x="880" y="164" text-anchor="end" fill="#475569" font-family="monospace" font-size="7">synced</text>

  <rect x="656" y="178" width="248" height="24" rx="4" fill="#0f1117" stroke="#f59e0b" stroke-width="0.6"/>
