  <rect x="62" y="192" width="8" height="8" rx="2" fill="#8b5cf6"/>
  <text x="78" y="200" fill="#a5b4fc" font-family="monospace" font-size="9" font-weight="bold">Code Guardian</text>
  <text x="260" y="200" text-anchor="end" fill="#64748b" font-family="monospace" font-size="7">AVAILABLE</text>
  <text x="78" y="216" fill="#64748b" font-family="monospace" font-size="7">Security scanning &amp; vulnerability detection</text>
  <text x="78" y="226" fill="#475569" font-family="monospace" font-size="7">MCP: 4 tools • Tier: Community</text>

