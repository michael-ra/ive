  <line x1="422" y1="481" x2="462" y2="481" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <rect x="464" y="466" width="160" height="30" rx="4" fill="#0f1117" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="544" y="485" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">Build Config</text>

  <line x1="624" y1="481" x2="664" y2="481" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <rect x="666" y="466" width="160" height="30" rx="4" fill="#0f1117" stroke="#4ade80" stroke-width="0.8"/>
  <text x="746" y="485" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">PTY Start + Tools</text>

  <!-- ═══ LLM Translation (bottom) ═══ -->
  <rect x="40" y="530" width="420" height="54" rx="8" fill="#1e1f2e" stroke="#d946ef" stroke-width="1"/>
  <text x="250" y="552" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="11" font-weight="bold">LLM-Assisted Translation</text>
  <text x="250" y="568" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Pattern detection • Confidence scoring • Validation loop</text>

  <rect x="500" y="530" width="420" height="54" rx="8" fill="#1e1f2e" stroke="#00d4ff" stroke-width="1"/>
  <text x="710" y="552" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="11" font-weight="bold">Canonical Format</text>
  <text x="710" y="568" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">One format → export to Claude Code, Gemini CLI, or standalone</text>

