  <rect x="56" y="134" width="248" height="46" rx="4" fill="#0f1117" stroke="#4ade80" stroke-width="0.8"/>
  <rect x="62" y="140" width="8" height="8" rx="2" fill="#4ade80"/>
  <text x="78" y="148" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">Deep Research</text>
  <text x="260" y="148" text-anchor="end" fill="#4ade80" font-family="monospace" font-size="7">INSTALLED</text>
  <text x="78" y="164" fill="#64748b" font-family="monospace" font-size="7">Multi-source research engine plugin</text>
