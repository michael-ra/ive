  <text x="880" y="194" text-anchor="end" fill="#475569" font-family="monospace" font-size="7">on-demand</text>

  <rect x="656" y="208" width="248" height="24" rx="4" fill="#0f1117" stroke="#94a3b8" stroke-width="0.6"/>
