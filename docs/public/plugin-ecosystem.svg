  <text x="880" y="134" text-anchor="end" fill="#475569" font-family="monospace" font-size="7">synced</text>

  <rect x="656" y="148" width="248" height="24" rx="4" fill="#0f1117" stroke="#8b5cf6" stroke-width="0.6"/>
