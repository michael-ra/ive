  <text x="386" y="146" fill="#fbbf24" font-family="monospace" font-size="9">manifest.json</text>
  <text x="520" y="146" fill="#64748b" font-family="monospace" font-size="7">metadata + components</text>
  <text x="386" y="164" fill="#4ade80" font-family="monospace" font-size="9">SKILL.md</text>
