  <text x="850" y="98" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">Cmd+1-9 switch</text>

  <!-- ═══ Split Terminal Grid (2x2) ═══ -->

  <!-- Terminal 1 (top-left) — Claude Code -->
  <rect x="40" y="120" width="428" height="210" rx="8" fill="#0a0a14" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="40" y="120" width="428" height="24" rx="8" fill="#1e1f2e"/>
