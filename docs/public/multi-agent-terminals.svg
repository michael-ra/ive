  <text x="480" y="60" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Real PTY Sessions • Broadcast • Grid Layouts • CLI-Agnostic</text>

  <!-- ═══ Tab Bar ═══ -->
  <rect x="40" y="78" width="880" height="32" rx="6" fill="#1a1b26" stroke="#334155" stroke-width="0.8"/>

