  <text x="422" y="98" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Testing</text>

  <rect x="480" y="84" width="100" height="20" rx="4" fill="#0f1117" stroke="#d946ef" stroke-width="0.5"/>
  <text x="530" y="98" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Gemini</text>

  <rect x="588" y="84" width="100" height="20" rx="4" fill="#0f1117" stroke="#334155" stroke-width="0.5"/>
  <text x="638" y="98" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Research</text>

