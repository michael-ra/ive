  <text x="54" y="418" fill="#64748b" font-family="monospace" font-size="9">Tool: Read (db/migrations/004.sql)</text>
  <text x="54" y="434" fill="#f0abfc" font-family="monospace" font-size="9">I'll add the refresh_tokens table</text>
  <text x="54" y="450" fill="#f0abfc" font-family="monospace" font-size="9">with proper foreign keys.</text>

