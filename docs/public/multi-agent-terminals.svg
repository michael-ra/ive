  <text x="506" y="402" fill="#94a3b8" font-family="monospace" font-size="9">Running test suite...</text>
  <text x="506" y="418" fill="#4ade80" font-family="monospace" font-size="9">PASS  auth.test.ts (12 tests)</text>
  <text x="506" y="434" fill="#4ade80" font-family="monospace" font-size="9">PASS  api.test.ts (8 tests)</text>
  <text x="506" y="450" fill="#ef4444" font-family="monospace" font-size="9">FAIL  refresh.test.ts (2 of 5)</text>
  <text x="506" y="466" fill="#94a3b8" font-family="monospace" font-size="9">Fixing failing tests...</text>

