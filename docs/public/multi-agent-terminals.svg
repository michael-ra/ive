  <text x="218" y="602" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="7">WebSocket I/O</text>

  <rect x="276" y="590" width="100" height="18" rx="4" fill="#0f1117" stroke="#d946ef" stroke-width="0.6"/>
