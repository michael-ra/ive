  <rect x="492" y="120" width="428" height="210" rx="8" fill="#0a0a14" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="492" y="120" width="428" height="24" rx="8" fill="#1e1f2e"/>
  <rect x="492" y="136" width="428" height="8" fill="#1e1f2e"/>
  <circle cx="508" cy="132" r="4" fill="#ef4444" opacity="0.7"/>
