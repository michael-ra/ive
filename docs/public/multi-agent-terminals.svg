  <rect x="394" y="126" width="60" height="14" rx="3" fill="#0f1117" stroke="#4ade80" stroke-width="0.5"/>
  <text x="424" y="136" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">working</text>

  <!-- Terminal content -->
  <text x="54" y="162" fill="#4ade80" font-family="monospace" font-size="9">$ claude --model opus --permission trusted</text>
  <text x="54" y="178" fill="#94a3b8" font-family="monospace" font-size="9">Reading auth/middleware.ts...</text>
  <text x="54" y="194" fill="#a5b4fc" font-family="monospace" font-size="9">I'll add JWT refresh token rotation to</text>
  <text x="54" y="210" fill="#a5b4fc" font-family="monospace" font-size="9">the authentication middleware.</text>
  <text x="54" y="230" fill="#64748b" font-family="monospace" font-size="9">Tool: Edit (auth/middleware.ts)</text>
  <text x="54" y="246" fill="#4ade80" font-family="monospace" font-size="9">+  const refreshToken = jwt.sign(...</text>
  <text x="54" y="262" fill="#4ade80" font-family="monospace" font-size="9">+    { userId, sessionId },</text>
  <text x="54" y="278" fill="#4ade80" font-family="monospace" font-size="9">+    REFRESH_SECRET, { expiresIn: '7d' }</text>

