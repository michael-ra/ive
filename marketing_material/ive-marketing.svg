<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="#04040c"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="78" rx="140" ry="80" fill="#8b5cf6" opacity="0.05">
    <animate attributeName="opacity" values="0.05;0.08;0.05" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ═══ SMALL ORBITAL MARK (top center) ═══ -->
  <g transform="translate(400,72)">

    <!-- Ring 1 + dot -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="22 0 0" to="382 0 0" dur="22s" repeatCount="indefinite"/>
      <ellipse rx="68" ry="26" fill="none" stroke="#00f0ff" stroke-opacity="0.18" stroke-width="0.8"/>
      <circle cx="62" cy="-11" r="2.5" fill="#00f0ff" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.25;0.8" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2.5;1.2;2.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Ring 2 + dots -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="-14 0 0" to="-374 0 0" dur="30s" repeatCount="indefinite"/>
      <ellipse rx="58" ry="22" fill="none" stroke="#8b5cf6" stroke-opacity="0.13" stroke-width="0.8"/>
      <circle cx="-51" cy="9" r="2.5" fill="#8b5cf6" opacity="0.75">
        <animate attributeName="opacity" values="0.75;0.2;0.75" dur="2.5s" begin="-0.8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2.5;1.2;2.5" dur="2.5s" begin="-0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="52" cy="-9" r="2" fill="#d946ef" opacity="0.75">
        <animate attributeName="opacity" values="0.75;0.2;0.75" dur="2.5s" begin="-1.7s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2;1;2" dur="2.5s" begin="-1.7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Core convergence V (50×50) -->
    <g transform="translate(-25,-25)">
      <path d="M0,0 L10,0 L25,34 L40,0 L50,0 L25,50 Z"
            fill="#00f0ff" opacity="0.78" style="mix-blend-mode:screen"
            transform="translate(-3.5,0) rotate(-7,25,50)"/>
      <path d="M0,0 L10,0 L25,34 L40,0 L50,0 L25,50 Z"
            fill="#8b5cf6" opacity="0.78" style="mix-blend-mode:screen"/>
      <path d="M0,0 L10,0 L25,34 L40,0 L50,0 L25,50 Z"
            fill="#d946ef" opacity="0.78" style="mix-blend-mode:screen"
            transform="translate(3.5,0) rotate(7,25,50)"/>
      <circle cx="25" cy="50" r="2" fill="#fff" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.4;0.85" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2;3;2" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- ═══ THE WORDPLAY ═══ -->

  <!-- "I've" — struck through, dim -->
  <text x="375" y="160" text-anchor="end"
        font-family="'SF Mono','Fira Code','JetBrains Mono',Menlo,Consolas,monospace"
        font-size="34" font-weight="400" letter-spacing="1"
        fill="#444466" opacity="0.7">I've</text>

  <!-- Strikethrough line over "I've" -->
  <line x1="295" y1="150" x2="380" y2="150" stroke="#666688" stroke-width="2" opacity="0.6"/>

  <!-- Static dot between I've and IVE -->
  <circle cx="403" cy="153" r="2" fill="#fff" opacity="0.4"/>

  <!-- "IVE" — glowing, gradient -->
  <text x="425" y="160" text-anchor="start"
        font-family="'SF Mono','Fira Code','JetBrains Mono',Menlo,Consolas,monospace"
        font-size="38" font-weight="800" letter-spacing="4"
        fill="url(#g)">IVE</text>

  <!-- ═══ CYCLING PUNCHLINES (16s cycle, 4 lines) ═══ -->

  <!-- 1: "finished writing code." (0–4s) -->
  <text x="400" y="200" text-anchor="middle" opacity="0"
        font-family="'SF Mono','Fira Code','JetBrains Mono',Menlo,Consolas,monospace"
        font-size="19" font-weight="400" letter-spacing="0.5"
        fill="#8888aa">
    finished writing code.
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite"
      values="0;1;1;0;0" keyTimes="0;0.03;0.22;0.25;1"/>
  </text>

  <!-- 2: "replaced your IDE." (4–8s) -->
  <text x="400" y="200" text-anchor="middle" opacity="0"
        font-family="'SF Mono','Fira Code','JetBrains Mono',Menlo,Consolas,monospace"
        font-size="19" font-weight="400" letter-spacing="0.5"
        fill="#8888aa">
    replaced your IDE.
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.25;0.28;0.47;0.50;1"/>
  </text>

  <!-- 3: "orchestrate coding agents." (8–12s) -->
  <text x="400" y="200" text-anchor="middle" opacity="0"
        font-family="'SF Mono','Fira Code','JetBrains Mono',Menlo,Consolas,monospace"
        font-size="19" font-weight="400" letter-spacing="0.5"
        fill="#8888aa">
    orchestrated your coding agents.
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.50;0.53;0.72;0.75;1"/>
  </text>

  <!-- 4: "seen the future." (12–16s) -->
  <text x="400" y="200" text-anchor="middle" opacity="0"
        font-family="'SF Mono','Fira Code','JetBrains Mono',Menlo,Consolas,monospace"
        font-size="19" font-weight="400" letter-spacing="0.5"
        fill="#8888aa">
    seen the future.
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.75;0.78;0.97;1"/>
  </text>

  <!-- ═══ BRANDING ═══ -->

  <text x="400" y="247" text-anchor="middle"
        font-family="'SF Mono','Fira Code','JetBrains Mono',Menlo,Consolas,monospace"
        font-size="10.5" letter-spacing="2.8"
        fill="#5a5a7a">INTEGRATED VIBECODING ENVIRONMENT</text>

</svg>
