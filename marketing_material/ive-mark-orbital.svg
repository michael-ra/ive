<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#04040c"/>

  <!-- Orbital Mark -->
  <g transform="translate(100,100)">

    <!-- Ring 1 (cyan) + orbiting dot -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="22 0 0" to="382 0 0" dur="22s" repeatCount="indefinite"/>
      <ellipse rx="95" ry="38" fill="none" stroke="#00f0ff" stroke-opacity="0.22" stroke-width="1"/>
      <circle cx="86" cy="-16" r="3.5" fill="#00f0ff" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3.5;1.8;3.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Ring 2 (violet) + orbiting dots -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="-14 0 0" to="-374 0 0" dur="30s" repeatCount="indefinite"/>
      <ellipse rx="82" ry="33" fill="none" stroke="#8b5cf6" stroke-opacity="0.16" stroke-width="1"/>
      <circle cx="-74" cy="14" r="3.5" fill="#8b5cf6" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.25;0.85" dur="2.5s" begin="-0.8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3.5;1.8;3.5" dur="2.5s" begin="-0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="74" cy="-14" r="3" fill="#d946ef" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.25;0.85" dur="2.5s" begin="-1.7s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3;1.5;3" dur="2.5s" begin="-1.7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Core convergence V (small) -->
    <g transform="translate(-30,-30)">
      <path d="M0,0 L12,0 L30,40.8 L48,0 L60,0 L30,60 Z"
            fill="#00f0ff" opacity="0.78" style="mix-blend-mode:screen"
            transform="translate(-4.2,0) rotate(-7,30,60)"/>
      <path d="M0,0 L12,0 L30,40.8 L48,0 L60,0 L30,60 Z"
            fill="#8b5cf6" opacity="0.78" style="mix-blend-mode:screen"/>
      <path d="M0,0 L12,0 L30,40.8 L48,0 L60,0 L30,60 Z"
            fill="#d946ef" opacity="0.78" style="mix-blend-mode:screen"
            transform="translate(4.2,0) rotate(7,30,60)"/>

      <!-- Apex glow -->
      <circle cx="30" cy="60" r="5" fill="#00f0ff" opacity="0.06">
        <animate attributeName="opacity" values="0.06;0.12;0.06" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="60" r="2.5" fill="#8b5cf6" opacity="0.1">
        <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="60" r="1.8" fill="#fff" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.45;0.9" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="r" values="1.8;2.8;1.8" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

  </g>
</svg>
